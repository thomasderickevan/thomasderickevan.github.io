esp_toml_version = 1.0

# Public base URL where the firmware binaries are hosted.
# This assumes the files are published from:
# https://thomasderickevan.github.io/LAPTOP_MONITOR/backup/
firmware_images_url = "https://thomasderickevan.github.io/LAPTOP_MONITOR/backup/"

supported_apps = ["gemini-voice-assistant"]

# Optional public markdown describing the firmware/app.
# config_readme_url = "https://your-domain.com/esp-box-3/README.md"

[gemini-voice-assistant]
chipsets = ["ESP32-S3"]
developKits.esp32-s3 = ["esp32-s3-box3"]
description = "ESP-BOX-3 firmware with dashboard, laptop monitor, IR monitor, games, and music control UI."
console_baudrate = 115200

# Optional app store links
android_app_url = ""
ios_app_url = ""

# Optional public markdown for this app
# readme.text = "https://your-domain.com/esp-box-3/README.md"

# Multi-binary flash layout matching the current backup set.
image.esp32-s3-box3 = "gemini_voice_assistant.bin"
bootloader.esp32-s3-box3 = "bootloader.bin"
partition_table.esp32-s3-box3 = "partition-table.bin"
otadata.esp32-s3-box3 = "ota_data_initial.bin"

flash_mode = "dio"
flash_freq = "80m"
flash_size = "16MB"

[gemini-voice-assistant.flash_files.esp32-s3-box3]
"0x0" = "bootloader.bin"
"0x8000" = "partition-table.bin"
"0xd000" = "ota_data_initial.bin"
"0x10000" = "gemini_voice_assistant.bin"
