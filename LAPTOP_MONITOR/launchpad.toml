esp_toml_version = 1.0

# Public URL where the published firmware files are hosted
firmware_images_url = "https://thomasderickevan.github.io/LAPTOP_MONITOR/"

# Launchpad app list
supported_apps = ["LAPTOP_MONITOR"]

# Optional public markdown shown by Launchpad
config_readme_url = "https://thomasderickevan.github.io/LAPTOP_MONITOR/README.md"

[LAPTOP_MONITOR]
chipsets = ["ESP32-S3"]
developKits.esp32-s3 = ["esp32-s3-box3"]

# Sample-style image mapping for the supported board
image.esp32-s3-box3 = "LAPTOP_MONITOR.bin"

description = "ESP-BOX-3 firmware with laptop monitor, provisioning setup, IR monitor, games, and music control UI."
android_app_url = ""
ios_app_url = ""
readme.text = "https://thomasderickevan.github.io/LAPTOP_MONITOR/README.md"
console_baudrate = 115200
